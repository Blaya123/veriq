services:
  postgres:
    image: postgres:16-alpine
    container_name: veriq-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: veriq
      POSTGRES_USER: veriq
      POSTGRES_PASSWORD: veriq123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veriq -d veriq"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: veriq-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: veriq-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://veriq:veriq123@postgres:5432/veriq?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${FRONTEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
    volumes:
      - backend_uploads:/app/apps/backend/uploads
    command: ["pm2-runtime", "start", "ecosystem.config.js", "--only", "backend", "--env", "production"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_APP_URL: ${FRONTEND_URL}
    container_name: veriq-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: /
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL}
    command: ["pm2-runtime", "start", "ecosystem.config.js", "--only", "frontend", "--env", "production"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
