# =============================================================================
# VERIQ - GitHub Actions CI/CD Pipeline
# =============================================================================
# Automatically deploys to your server when you push to main.
# 
# Setup:
#   1. Add these secrets in your GitHub repo Settings → Secrets:
#      - DEPLOY_HOST     (your server IP)
#      - DEPLOY_USER     (SSH user, e.g., ubuntu)
#      - DEPLOY_SSH_KEY  (private SSH key for server access)
#   2. Push to main → auto-deploys!
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" bash -s << 'EOF'
            set -e
            cd ~/veriq

            # Pull latest code
            git pull origin main

            # Build and restart
            docker compose down
            docker compose build --pull
            docker compose up -d

            # Run migrations
            docker compose exec -T backend npx prisma migrate deploy

            # Clean up old images
            docker image prune -f

            echo "=== Deploy complete ==="
          EOF
